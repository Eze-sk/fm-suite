name: Publish on npm

on:
  push:
    branches:
      - main
      - next
    paths:
      - 'packages/fmsuit-cli/**'
      
permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Build CLI package
        run: bun x turbo run build --filter=@fm-suit/cli

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          
      - name: Publish to NPM
        run: |
          cd packages/fmsuit-cli 
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: |
          cd packages/fmsuit-cli
          bunx semantic-release
